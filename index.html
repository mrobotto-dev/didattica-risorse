<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Risorse Didattiche - Laboratorio di Informatica</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 40px 20px;
  }
  .container { max-width: 900px; margin: 0 auto; }
  .page-title { text-align: center; margin-bottom: 8px; }
  .page-title h1 {
    font-size: 28px; font-weight: 800;
    background: linear-gradient(135deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .page-subtitle {
    text-align: center; color: #94a3b8; font-size: 14px; margin-bottom: 40px;
  }
  .year-section { margin-bottom: 40px; }
  .year-header {
    font-size: 20px; font-weight: 700; color: #60a5fa;
    border-bottom: 2px solid #1e293b; padding-bottom: 8px; margin-bottom: 20px;
    cursor: pointer; user-select: none;
  }
  .year-header:hover { color: #93c5fd; }
  .year-header .toggle { font-size: 14px; margin-right: 8px; }
  .class-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
  .class-card {
    background: #1e293b; border: 1px solid #334155; border-radius: 12px;
    padding: 20px; transition: all 0.3s ease;
  }
  .class-card:hover { border-color: #60a5fa; transform: translateY(-2px); }
  .class-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .class-card .materia { color: #94a3b8; font-size: 13px; margin-bottom: 14px; }
  .modulo-section { margin-bottom: 12px; }
  .modulo-label {
    font-size: 12px; font-weight: 600; color: #60a5fa;
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .resource-list { list-style: none; padding: 0; }
  .resource-list li { margin-bottom: 8px; }
  .resource-link {
    display: block; padding: 8px 12px; border-radius: 8px;
    background: #0f172a; border: 1px solid #1e293b;
    text-decoration: none; transition: all 0.2s;
  }
  .resource-link:hover { border-color: #a78bfa; background: #1a1f35; }
  .resource-link .res-title {
    color: #a78bfa; font-size: 14px; font-weight: 600; display: block;
  }
  .resource-link .res-desc {
    color: #64748b; font-size: 12px; margin-top: 2px; display: block;
  }
  .resource-link .res-date {
    color: #475569; font-size: 11px; margin-top: 2px; display: block;
  }
  .loading { text-align: center; color: #94a3b8; padding: 40px; }
  .error { text-align: center; color: #f87171; padding: 40px; }
  .footer {
    text-align: center; color: #475569; font-size: 12px;
    margin-top: 60px; padding-top: 20px; border-top: 1px solid #1e293b;
  }
  @media (max-width: 600px) {
    .class-grid { grid-template-columns: 1fr; }
    body { padding: 20px 12px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="page-title"><h1>Risorse Didattiche</h1></div>
  <p class="page-subtitle">Laboratorio di Informatica &mdash; Prof. Gaetano Pappacena</p>
  <div id="content"><p class="loading">Caricamento risorse...</p></div>
  <div class="footer">&copy; 2025 &mdash; Risorse didattiche pubblicate su GitHub Pages</div>
</div>
<script>
(async function() {
  const container = document.getElementById('content');
  try {
    const res = await fetch('risorse.json');
    if (!res.ok) throw new Error('Impossibile caricare risorse.json');
    const data = await res.json();
    const risorse = data.risorse;
    if (!risorse || risorse.length === 0) {
      container.innerHTML = '<p class="loading">Nessuna risorsa pubblicata.</p>';
      return;
    }
    // Raggruppa: anno > classe > modulo > risorse
    const anni = {};
    risorse.forEach(r => {
      if (!anni[r.anno]) anni[r.anno] = {};
      const key = r.classe;
      if (!anni[r.anno][key]) anni[r.anno][key] = { display: r.classe_display, moduli: {} };
      if (!anni[r.anno][key].moduli[r.modulo]) {
        anni[r.anno][key].moduli[r.modulo] = { display: r.modulo_display, items: [] };
      }
      anni[r.anno][key].moduli[r.modulo].items.push(r);
    });
    let html = '';
    // Ordina anni decrescente
    const anniOrdinati = Object.keys(anni).sort().reverse();
    anniOrdinati.forEach(anno => {
      const annoDisplay = anno.replace('-', '/');
      html += '<div class="year-section">';
      html += '<h2 class="year-header">Anno Scolastico ' + annoDisplay + '</h2>';
      html += '<div class="class-grid">';
      const classi = Object.keys(anni[anno]).sort();
      classi.forEach(classe => {
        const c = anni[anno][classe];
        // Estrai sigla classe e materia
        const parts = c.display.split(' ');
        const sigla = parts[0];
        const materia = parts.slice(1).join(' ');
        html += '<div class="class-card">';
        html += '<h3>' + sigla + '</h3>';
        html += '<div class="materia">' + materia + '</div>';
        const moduli = Object.keys(c.moduli);
        moduli.forEach(modulo => {
          const m = c.moduli[modulo];
          html += '<div class="modulo-section">';
          html += '<div class="modulo-label">' + m.display + '</div>';
          html += '<ul class="resource-list">';
          m.items.forEach(item => {
            const url = anno + '/' + classe + '/' + modulo + '/' + item.file;
            html += '<li><a class="resource-link" href="' + url + '">';
            html += '<span class="res-title">' + item.titolo + '</span>';
            if (item.descrizione) {
              html += '<span class="res-desc">' + item.descrizione + '</span>';
            }
            html += '<span class="res-date">' + item.esercitazione + ' &middot; ' + item.data_pubblicazione + '</span>';
            html += '</a></li>';
          });
          html += '</ul></div>';
        });
        html += '</div>';
      });
      html += '</div></div>';
    });
    container.innerHTML = html;
  } catch (e) {
    container.innerHTML = '<p class="error">Errore nel caricamento delle risorse.<br><small>' + e.message + '</small></p>';
  }
})();
</script>
</body>
</html>
